<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bio | 0jrpg</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    background: radial-gradient(circle at top, #1a1a1a, #000);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
}

/* Card */
.bio-container {
    width: 100%;
    max-width: 380px;
    padding: 35px 25px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    border-radius: 22px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
}

/* Foto */
.profile-photo {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid rgba(255,255,255,0.6);
    box-shadow: 0 0 25px rgba(255,255,255,0.25);
    margin-bottom: 18px;
}

/* Nome */
.name {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 22px;
}

/* Botões base */
.link-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 12px 0;
    padding: 14px;
    border-radius: 14px;
    color: #fff;
    text-decoration: none;
    font-size: 16px;
    transition: 0.35s;
    position: relative;
    overflow: hidden;
}

/* Hover geral */
.link-btn:hover {
    transform: translateY(-3px) scale(1.03);
}

/* EMAIL */
.email-btn {
    background: linear-gradient(135deg, #3a3a3a, #1f1f1f);
}
.email-btn:hover {
    box-shadow: 0 0 20px rgba(255,255,255,0.4);
}

/* INSTAGRAM */
.instagram-btn {
    background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
}
.instagram-btn:hover {
    box-shadow: 0 0 25px rgba(253,29,29,0.8);
}

/* TIKTOK */
.tiktok-btn {
    background: linear-gradient(135deg, #000, #111);
}
.tiktok-btn:hover {
    box-shadow: 
        0 0 15px #25f4ee,
        0 0 25px #fe2c55;
}

/* SPROKTURDI RADIOATIVO */
.sprok-btn {
    background: linear-gradient(135deg, #00ff6a, #00cc55);
    color: #003b1f;
    font-weight: 600;
}
.sprok-btn:hover {
    box-shadow:
        0 0 20px #00ff6a,
        0 0 40px #00ff6a,
        inset 0 0 10px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div class="bio-container">

    <!-- FOTO -->
    <img 
        src="https://raw.githubusercontent.com/joaoricardobr-student/joaoricardobr-student.github.io/refs/heads/main/WhatsApp%20Image%202026-01-24%20at%2022.31.21.jpeg"
        alt="Foto de perfil"
        class="profile-photo"
    >

    <div class="name">João Ricardo Pontes Garbelini</div>

    <!-- BOTÕES -->
    <a href="mailto:0jrpg@proton.me" class="link-btn email-btn">
        ✉️ Meu email de contato
    </a>

    <a href="https://www.instagram.com/0jrpg/" target="_blank" class="link-btn instagram-btn">
        📸 Instagram
    </a>

    <a href="https://www.tiktok.com/@joaoricardinhoo" target="_blank" class="link-btn tiktok-btn">
        🎵 TikTok
    </a>

    <a href="https://sites.google.com/view/sprokturdi" target="_blank" class="link-btn sprok-btn">
        ☢️ Site do SprokTurdi
    </a>

</div>

</body>
</html>
